<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Belize RDT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="header">
        <h1>BELIZE RDT</h1>
        <button onclick="toggleDarkMode()" class="btn-theme">🌓</button>
    </div>

    <div id="rest-screen" class="hidden">
        <div class="card" style="text-align:center; padding: 40px 20px;">
            <h2 style="color: var(--belize);">✨ Bom Descanso</h2>
            <p id="rest-message"></p>
            <button class="btn-adm" onclick="location.reload()">SAIR</button>
        </div>
    </div>

    <div id="login-screen">
        <input type="text" id="login-user" placeholder="Usuário">
        <input type="password" id="login-pass" placeholder="Senha">
        <button class="btn-adm" onclick="handleLogin()">ENTRAR</button>
    </div>

    <div id="admin-panel" class="hidden">
        <div class="nav-header"><b>ADMIN</b> <button onclick="location.reload()">SAIR</button></div>
        <div class="card">
            <div id="month-nav"><button onclick="changeMonth(-1)">◀ Mês Anterior</button> <button onclick="changeMonth(1)">Próximo Mês ▶</button></div>
            <div id="calendar-container"></div>
            <p id="selected-date-label" style="text-align:center; font-weight:bold"></p>
        </div>
        <div class="card">
            <select id="assign-to"></select>
            <input type="text" id="task-desc" placeholder="Tarefa">
            <button class="btn-adm" onclick="createTask()">LANÇAR TAREFA</button>
        </div>
        <div id="worker-accordion"></div>
    </div>

    <div id="worker-panel" class="hidden">
        <div class="nav-header"><b>Olá, <span id="display-worker-name"></span></b> <button onclick="location.reload()">SAIR</button></div>
        <div id="worker-task-list"></div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
