<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belize RDT - Sistema de Gestão</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="header">
        <h1>BELIZE RDT</h1>
        <p class="subtitle">RELATÓRIO DIÁRIO DE TRABALHO</p>
    </div>

    <div id="login-screen">
        <input type="text" id="login-user" placeholder="Nome do Funcionário">
        <input type="password" id="login-pass" placeholder="Senha">
        <button class="btn-adm" onclick="handleLogin()">ENTRAR NO SISTEMA</button>
        <p style="text-align:center; font-size:0.6rem; color:#94a3b8; margin-top:10px;">Acesso restrito a colaboradores Belize.</p>
    </div>

    <div id="change-pass-screen" class="hidden">
        <div class="card border-danger">
            <h4>🔐 Nova Senha Obrigatória</h4>
            <p style="font-size:0.8rem">Para sua segurança, crie uma senha pessoal:</p>
            <input type="password" id="new-p1" placeholder="Nova Senha">
            <input type="password" id="new-p2" placeholder="Confirme a Senha">
            <button class="btn-success" onclick="finalizePassChange()">SALVAR E ACESSAR</button>
        </div>
    </div>

    <div id="admin-panel" class="hidden">
        <div class="nav-header">
            <b class="text-belize">PAINEL ENCARREGADO</b>
            <button class="btn-small" onclick="location.reload()">SAIR</button>
        </div>

        <div class="card bg-dash">
            <h4 style="margin:0 0 10px 0; color: #1e40af;">📊 Produtividade Semanal</h4>
            <div id="dashboard-stats"></div>
            <p id="week-info" style="font-size: 0.6rem; color: #60a5fa; margin-top: 8px; text-align: center;"></p>
        </div>
        
        <div class="card">
            <h4>📅 Agendar Atividade</h4>
            <select id="assign-to"></select>
            <input type="text" id="task-desc" placeholder="O que deve ser feito?">
            <button class="btn-adm" onclick="createTask()">LANÇAR TAREFA</button>
        </div>

        <h4>Equipe e Atividades</h4>
        <div id="worker-accordion"></div>

        <div class="card bg-report">
            <button class="btn-wa" onclick="generateReport()">📋 GERAR RELATÓRIO DO DIA</button>
            <div id="report-area" class="hidden mt-10">
                <textarea id="report-text" rows="5"></textarea>
                <button class="btn-wa" onclick="sendAndClear()">ENVIAR WHATSAPP E LIMPAR</button>
            </div>
        </div>
    </div>

    <div id="worker-panel" class="hidden">
        <div class="nav-header">
            <b>Olá, <span id="display-worker-name"></span></b>
            <button class="btn-small" onclick="location.reload()">SAIR</button>
        </div>
        
        <div id="active-task-area" class="hidden"></div>
        
        <h4>Suas Atribuições</h4>
        <div id="worker-task-list"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
