<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Belize RDA - Gestão</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="header">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div style="text-align: left;">
                <h1>BELIZE RDA</h1>
                <p class="subtitle">RELATÓRIO DIÁRIO DE ATIVIDADES</p>
            </div>
            <button onclick="toggleDarkMode()" class="btn-theme">🌓</button>
        </div>
    </div>

    <div id="login-screen">
        <label style="display:block; margin:10px 0 5px;">Selecione o Usuário:</label>
        <select id="login-user">
            <option value="admin">Administrador</option>
            <option value="mateus">Mateus</option>
            <option value="luis">Luis</option>
            <option value="gamarra">Gamarra</option>
            <option value="lucas">Lucas</option>
        </select>
        <input type="password" id="login-pass" placeholder="Senha">
        <button class="btn-adm" onclick="handleLogin()">ENTRAR NO SISTEMA</button>
    </div>

    <div id="admin-panel" class="hidden">
        <div class="nav-header">
            <b class="text-belize">PAINEL ENCARREGADO</b>
            <button class="btn-small" onclick="location.reload()">SAIR</button>
        </div>
        <div class="card">
            <h4>📅 Agendar Atividade</h4>
            <div id="calendar-container"></div>
            <p id="selected-date-label" style="text-align:center; font-weight:bold; margin-top:10px; color:var(--belize)"></p>
            <select id="assign-to"></select>
            <input type="text" id="task-desc" placeholder="O que deve ser feito?">
            <button class="btn-adm" onclick="createTask()">LANÇAR TAREFA</button>
        </div>
        <h4>Equipe e Atividades</h4>
        <div id="worker-accordion"></div>
    </div>

    <div id="worker-panel" class="hidden">
        <div class="nav-header">
            <b>Olá, <span id="display-worker-name"></span></b>
            <button class="btn-small" onclick="location.reload()">SAIR</button>
        </div>
        <div id="worker-task-list"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
