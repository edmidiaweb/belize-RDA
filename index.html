<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Belize RDT - Gestão</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="header">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div style="text-align: left;">
                <h1>BELIZE RDT</h1>
                <p class="subtitle">RELATÓRIO DIÁRIO DE TRABALHO</p>
            </div>
            <button onclick="toggleDarkMode()" class="btn-theme">🌓</button>
        </div>
    </div>

    <div id="rest-screen" class="hidden">
        <div class="card" style="text-align: center; padding: 40px 20px;">
            <h2 style="color: var(--belize);">✨ Momento de Descanso</h2>
            <p id="rest-message" style="font-style: italic;"></p>
            <button class="btn-adm" style="margin-top:20px" onclick="location.reload()">SAIR</button>
        </div>
    </div>

    <div id="login-screen">
        <input type="text" id="login-user" placeholder="Usuário">
        <input type="password" id="login-pass" placeholder="Senha">
        <button class="btn-adm" onclick="handleLogin()">ENTRAR NO SISTEMA</button>
    </div>

    <div id="admin-panel" class="hidden">
        <div class="nav-header">
            <b class="text-belize">PAINEL ENCARREGADO</b>
            <button class="btn-small" onclick="location.reload()">SAIR</button>
        </div>
        
        <div class="card">
            <h4>📅 Agendar Atividade</h4>
            <div id="month-nav" class="hidden" style="margin-bottom:10px">
                <button class="btn-small" onclick="changeMonth(-1)">◀</button>
                <button class="btn-small" onclick="changeMonth(1)">▶</button>
            </div>
            <div id="calendar-container"></div>
            <p id="selected-date-label" style="text-align:center; font-weight:bold; margin-top:10px; color:var(--belize)"></p>
            
            <select id="assign-to" style="margin-top:15px"></select>
            <input type="text" id="task-desc" placeholder="O que deve ser feito?">
            <button class="btn-adm" onclick="createTask()">LANÇAR TAREFA</button>
        </div>

        <h4>Equipe e Atividades</h4>
        <div id="worker-accordion"></div>

        <div class="card bg-report">
            <button class="btn-wa" onclick="generateReport()">📋 GERAR RELATÓRIO DO DIA</button>
            <div id="report-area" class="hidden mt-10">
                <textarea id="report-text" rows="5"></textarea>
                <button class="btn-wa" onclick="sendAndClear()">ENVIAR WHATSAPP</button>
            </div>
        </div>
    </div>

    <div id="worker-panel" class="hidden">
        <div class="nav-header">
            <b>Olá, <span id="display-worker-name"></span></b>
            <button class="btn-small" onclick="location.reload()">SAIR</button>
        </div>
        <div id="worker-task-list"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
